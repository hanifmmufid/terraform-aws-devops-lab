name: Terraform Apply Dev

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: "Type APPLY to confirm Terraform apply"
        required: true
        default: "NO"

permissions:
  contents: read

jobs:
  terraform-plan:
    name: Terraform Plan Dev
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm_apply }}" != "APPLY" ]; then
            echo "You must type APPLY to run this workflow."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../..

      - name: Create runtime tfvars
        run: |
          printf 'allowed_ssh_cidr = "%s"\nssh_public_key_content = "%s"\n' \
            "${{ secrets.TF_VAR_ALLOWED_SSH_CIDR }}" \
            "${{ secrets.SSH_PUBLIC_KEY_CONTENT }}" > runtime.tfvars

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -var-file=runtime.tfvars -out=tfplan

      - name: Export Terraform plan
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-plan
          path: envs/dev/tfplan.txt

      - name: Upload Terraform binary plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-tfplan
          path: envs/dev/tfplan

  terraform-apply:
    name: Terraform Apply Dev
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: dev

    defaults:
      run:
        working-directory: envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Download Terraform binary plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-tfplan
          path: envs/dev

      - name: Terraform apply
        run: terraform apply -input=false tfplan
